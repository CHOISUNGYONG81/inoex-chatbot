<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>샘플 FAQ 생성기</title>
  <script src="https://cdn.jsdelivr.net/npm/xlsx/dist/xlsx.full.min.js"></script>
  <style>
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      max-width: 600px; margin: 60px auto; padding: 0 20px;
      color: #1e293b; background: #f8fafc;
    }
    h1 { font-size: 22px; margin-bottom: 8px; }
    p  { color: #64748b; font-size: 14px; margin-bottom: 24px; }
    button {
      padding: 12px 28px; background: #2563eb; color: #fff;
      border: none; border-radius: 8px; font-size: 15px;
      font-weight: 600; cursor: pointer; transition: background .15s;
    }
    button:hover { background: #1d4ed8; }
    .note {
      margin-top: 20px; font-size: 12px; color: #94a3b8;
      background: #f1f5f9; padding: 12px; border-radius: 8px;
    }
  </style>
</head>
<body>
  <h1>📊 샘플 FAQ xlsx 생성기</h1>
  <p>버튼을 클릭하면 이노EX Q&A 챗봇용 샘플 <code>faq.xlsx</code> 파일이 다운로드됩니다.<br>
     다운로드 후 챗봇 앱에서 업로드하거나 <code>data/</code> 폴더에 저장하세요.</p>

  <button onclick="generateFAQ()">faq.xlsx 다운로드</button>

  <div class="note">
    💡 엑셀 파일 형식: <strong>A열=질문, B열=답변, C열=카테고리</strong><br>
    1행은 헤더(질문/답변/카테고리)로, 2행부터 실제 데이터를 입력하세요.
  </div>

  <script>
  function generateFAQ() {
    const rows = [
      ["질문", "답변", "카테고리"],
      [
        "이노EX Core는 어떤 제품인가요?",
        "이노EX Core는 기업의 핵심 업무 프로세스를 자동화하는 엔터프라이즈 플랫폼입니다. 인사관리, 회계, 프로젝트 관리 등 핵심 비즈니스 모듈을 통합 제공하며, 클라우드와 온프레미스 환경 모두 지원합니다.",
        "제품소개"
      ],
      [
        "이노EX Analytics의 주요 기능은 무엇인가요?",
        "이노EX Analytics는 실시간 데이터 분석, 커스텀 대시보드 생성, 자동 보고서 생성, BI 도구 연동 기능을 제공합니다. 비즈니스 인사이트를 시각화하여 데이터 기반 의사결정을 지원합니다.",
        "제품소개"
      ],
      [
        "이노EX Connect란 무엇인가요?",
        "이노EX Connect는 기업 내외부 시스템 간의 데이터 연동을 지원하는 통합 플랫폼입니다. REST API, 웹훅, 배치 연동 등 다양한 방식을 지원하여 기존 레거시 시스템과도 원활하게 연결됩니다.",
        "제품소개"
      ],
      [
        "라이선스 비용은 어떻게 되나요?",
        "라이선스는 사용자 수 및 선택 모듈에 따라 맞춤 산정됩니다. 기본 플랜부터 엔터프라이즈 플랜까지 다양한 옵션이 있으며, 정확한 견적은 영업팀(sales@inoblock.com)으로 문의해 주세요.",
        "가격/라이선스"
      ],
      [
        "무료 체험이 가능한가요?",
        "네, 모든 이노EX 제품은 30일 무료 체험이 가능합니다. 홈페이지에서 신청하시면 전담 담당자가 데모 환경을 설정하고 온보딩을 도와드립니다.",
        "가격/라이선스"
      ],
      [
        "기술 지원은 어떻게 받나요?",
        "기술 지원은 헬프데스크 포털, 이메일(support@inoblock.com), 전화(1588-4663)를 통해 받으실 수 있습니다. 유지보수 계약 고객께는 24/7 전담 지원이 제공되며, 평균 응답 시간은 2시간 이내입니다.",
        "고객지원"
      ],
      [
        "이노EX 도입 시 교육 지원이 있나요?",
        "네, 도입 시 관리자 교육, 사용자 교육, 온보딩 교육이 기본 포함됩니다. 또한 온라인 학습 포털을 통해 동영상 강의와 매뉴얼을 언제든지 이용하실 수 있습니다.",
        "고객지원"
      ],
      [
        "데이터 보안은 어떻게 관리되나요?",
        "이노EX는 AES-256 암호화, SSL/TLS 통신 보안, 역할 기반 접근 제어(RBAC)를 적용합니다. ISO 27001 및 ISMS 인증을 보유하고 있으며, 개인정보보호법과 클라우드 보안인증(CSAP)을 준수합니다.",
        "보안"
      ],
      [
        "온프레미스와 클라우드 중 어떤 것을 선택해야 하나요?",
        "온프레미스는 데이터 보안이 중요하거나 고도의 커스터마이징이 필요한 경우에 적합합니다. 클라우드(SaaS)는 빠른 도입과 낮은 운영 부담이 필요한 경우에 권장합니다. 전문 컨설턴트와 상담을 통해 최적안을 결정하실 수 있습니다.",
        "기술지원"
      ],
      [
        "업그레이드 및 패치는 어떻게 진행되나요?",
        "클라우드 버전은 무중단 자동 업데이트가 제공됩니다. 온프레미스 버전은 분기별 정기 업데이트 패키지를 제공하며, 관리자 콘솔에서 원클릭으로 적용 가능합니다. 주요 업그레이드 전에는 사전 공지가 발송됩니다.",
        "기술지원"
      ]
    ];

    const wb = XLSX.utils.book_new();
    const ws = XLSX.utils.aoa_to_sheet(rows);

    // 열 너비 설정
    ws["!cols"] = [
      { wch: 42 },  // A: 질문
      { wch: 80 },  // B: 답변
      { wch: 14 }   // C: 카테고리
    ];

    // 헤더 행 스타일 (SheetJS Community 버전에서는 제한적)
    XLSX.utils.book_append_sheet(wb, ws, "FAQ");
    XLSX.writeFile(wb, "faq.xlsx");
  }
  </script>
</body>
</html>
