<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>포세린 타일 Q&A 챗봇</title>
<style>
:root {
  --primary: #2563eb; --primary-dark: #1d4ed8; --primary-light: #eff6ff;
  --primary-muted: #93c5fd; --bg: #f1f5f9; --bg-card: #fff;
  --border: #e2e8f0; --text: #1e293b; --text-muted: #94a3b8;
  --shadow-sm: 0 1px 2px rgba(0,0,0,.06); --shadow-lg: 0 8px 24px rgba(0,0,0,.12);
  --radius-sm: 8px; --radius-lg: 20px;
}
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html, body { height: 100%; overflow: hidden; }
body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "Noto Sans KR", sans-serif; font-size: 14px; color: var(--text); background: var(--bg); line-height: 1.6; }
.app-wrapper { display: flex; flex-direction: column; height: 100vh; max-width: 900px; margin: 0 auto; background: var(--bg-card); box-shadow: var(--shadow-lg); }

/* Header */
.app-header { height: 60px; display: flex; align-items: center; justify-content: space-between; padding: 0 16px; background: linear-gradient(135deg, #1e3a5f 0%, #2563eb 100%); color: #fff; flex-shrink: 0; }
.header-brand { display: flex; align-items: center; gap: 10px; }
.brand-icon { width: 36px; height: 36px; border-radius: var(--radius-sm); background: rgba(255,255,255,.2); display: flex; align-items: center; justify-content: center; font-weight: 800; font-size: 13px; }
.brand-name { font-weight: 700; font-size: 16px; }
.brand-subtitle { font-size: 11px; opacity: .75; display: block; }
.mode-badge { padding: 4px 12px; border-radius: 99px; background: rgba(34,197,94,.25); color: #86efac; font-size: 11px; font-weight: 700; }

/* Quick Panel */
.quick-panel { background: var(--primary-light); border-bottom: 1px solid var(--border); padding: 10px 16px; flex-shrink: 0; }
.quick-categories { display: flex; gap: 6px; flex-wrap: wrap; margin-bottom: 8px; }
.category-btn { padding: 4px 12px; border-radius: 99px; border: 1px solid var(--primary-muted); background: transparent; color: var(--primary); font-size: 12px; font-weight: 600; cursor: pointer; transition: all .15s; }
.category-btn.active { background: var(--primary); border-color: var(--primary); color: #fff; }
.quick-questions { display: flex; gap: 6px; flex-wrap: wrap; }
.quick-q-btn { padding: 5px 12px; border-radius: var(--radius-sm); border: 1px solid var(--border); background: var(--bg-card); color: var(--text); font-size: 12px; cursor: pointer; transition: all .15s; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; max-width: 300px; }
.quick-q-btn:hover { border-color: var(--primary); color: var(--primary); background: var(--primary-light); }

/* Chat */
.chat-area { flex: 1; overflow-y: auto; padding: 20px 16px; display: flex; flex-direction: column; gap: 16px; scroll-behavior: smooth; }
.chat-area::-webkit-scrollbar { width: 4px; }
.chat-area::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }
.message { display: flex; gap: 10px; animation: fadeIn .2s ease; }
@keyframes fadeIn { from { opacity:0; transform:translateY(8px); } to { opacity:1; transform:translateY(0); } }
.message.assistant { align-items: flex-start; }
.message.assistant .avatar { width: 32px; height: 32px; border-radius: var(--radius-sm); background: linear-gradient(135deg, #1e3a5f 0%, #2563eb 100%); color: #fff; display: flex; align-items: center; justify-content: center; font-size: 11px; font-weight: 800; flex-shrink: 0; margin-top: 2px; }
.message.assistant .bubble { background: var(--bg-card); border: 1px solid var(--border); border-radius: 0 var(--radius-lg) var(--radius-lg) var(--radius-lg); padding: 12px 16px; box-shadow: var(--shadow-sm); max-width: calc(100% - 42px); }
.message.user { flex-direction: row-reverse; align-items: flex-end; }
.message.user .bubble { background: linear-gradient(135deg, #2563eb 0%, #1d4ed8 100%); border-radius: var(--radius-lg) var(--radius-lg) 0 var(--radius-lg); padding: 12px 16px; color: #fff; max-width: 75%; word-break: break-word; }
.bubble p { margin: 0 0 8px; }
.bubble p:last-child { margin-bottom: 0; }
.bubble strong { font-weight: 600; }
.bubble ul, .bubble ol { padding-left: 20px; margin: 6px 0; }
.bubble li { margin: 3px 0; }
.bubble table { width: 100%; border-collapse: collapse; font-size: 12px; margin: 8px 0; }
.bubble th { background: var(--primary-light); color: var(--primary); padding: 5px 8px; text-align: left; border: 1px solid var(--border); font-weight: 600; }
.bubble td { padding: 5px 8px; border: 1px solid var(--border); }
.bubble tr:nth-child(even) td { background: #f8fafc; }

/* 명확화 선택 버튼 */
.clarify-intro { font-size: 13px; margin-bottom: 10px; line-height: 1.6; }
.clarify-intro strong { color: var(--primary); }
.clarify-options { display: flex; flex-direction: column; gap: 6px; }
.clarify-btn {
  text-align: left; padding: 9px 14px;
  border-radius: var(--radius-sm); border: 1px solid var(--primary-muted);
  background: var(--primary-light); color: var(--primary);
  font-size: 13px; font-family: inherit; line-height: 1.4;
  cursor: pointer; transition: all .15s; display: flex; align-items: flex-start; gap: 8px;
}
.clarify-btn::before {
  content: "›"; font-size: 16px; font-weight: 700; flex-shrink: 0;
  line-height: 1.3; color: var(--primary-muted);
}
.clarify-btn:hover { background: var(--primary); color: #fff; border-color: var(--primary); }
.clarify-btn:hover::before { color: rgba(255,255,255,.7); }
.clarify-btn:disabled { opacity: .45; cursor: not-allowed; pointer-events: none; }
.clarify-cat-header {
  font-size: 11px; font-weight: 700; color: var(--text-muted); letter-spacing: .4px;
  margin: 10px 0 4px; padding: 4px 0; border-bottom: 1px solid var(--border);
  display: flex; align-items: center; gap: 6px;
}
.clarify-cat-header::before {
  content: ""; width: 3px; height: 12px;
  border-radius: 2px; background: var(--primary-muted); flex-shrink: 0;
}
.clarify-cat-header:first-child { margin-top: 4px; }

/* Product links */
.message-footer { display: flex; flex-direction: column; gap: 6px; margin-top: 4px; margin-left: 42px; }
.product-links-label { font-size: 11px; color: var(--text-muted); font-weight: 500; }
.product-links { display: flex; gap: 6px; flex-wrap: wrap; }
.product-link { display: inline-flex; align-items: center; gap: 4px; padding: 4px 10px; border-radius: 99px; background: var(--primary-light); border: 1px solid var(--primary-muted); color: var(--primary); font-size: 11px; font-weight: 600; text-decoration: none; transition: all .15s; }
.product-link:hover { background: var(--primary); color: #fff; }
.product-link::after { content: "↗"; font-size: 10px; }

/* Typing */
.typing-indicator { display: flex; align-items: center; gap: 10px; }
.typing-indicator .avatar { width: 32px; height: 32px; border-radius: var(--radius-sm); background: linear-gradient(135deg, #1e3a5f 0%, #2563eb 100%); color: #fff; display: flex; align-items: center; justify-content: center; font-size: 11px; font-weight: 800; flex-shrink: 0; }
.typing-dots { background: var(--bg-card); border: 1px solid var(--border); border-radius: 0 var(--radius-lg) var(--radius-lg) var(--radius-lg); padding: 12px 16px; display: flex; gap: 5px; align-items: center; }
.typing-dots span { width: 7px; height: 7px; border-radius: 50%; background: var(--primary-muted); display: inline-block; animation: bounce 1.2s infinite; }
.typing-dots span:nth-child(2) { animation-delay: .2s; }
.typing-dots span:nth-child(3) { animation-delay: .4s; }
@keyframes bounce { 0%,60%,100% { transform:translateY(0); opacity:.4; } 30% { transform:translateY(-6px); opacity:1; } }

/* Input */
.input-area { padding: 12px 16px; background: var(--bg-card); border-top: 1px solid var(--border); flex-shrink: 0; }
.input-wrap { display: flex; align-items: flex-end; gap: 8px; background: var(--bg); border: 1.5px solid var(--border); border-radius: var(--radius-lg); padding: 8px 8px 8px 16px; transition: border-color .15s, box-shadow .15s; }
.input-wrap:focus-within { border-color: var(--primary); box-shadow: 0 0 0 3px rgba(37,99,235,.1); }
#user-input { flex: 1; border: none; background: transparent; resize: none; font-size: 14px; font-family: inherit; color: var(--text); line-height: 1.5; max-height: 120px; outline: none; }
#user-input::placeholder { color: var(--text-muted); }
.send-btn { width: 36px; height: 36px; border-radius: var(--radius-sm); border: none; background: var(--primary); color: #fff; display: flex; align-items: center; justify-content: center; cursor: pointer; transition: background .15s, transform .1s; flex-shrink: 0; }
.send-btn:hover { background: var(--primary-dark); }
.send-btn:active { transform: scale(.95); }
.send-btn:disabled { background: var(--text-muted); cursor: not-allowed; }
@media (max-width: 600px) { .quick-q-btn { max-width: 220px; } .message-footer { margin-left: 0; } }
</style>
</head>

<div class="app-wrapper">

</div>

/* ── 검색 엔진 ─────────────────────────────────────── */
function ngrams(text, n) {
  const s = text.replace(/\s+/g,"").toLowerCase();
  const g = [];
  for (let i = 0; i <= s.length - n; i++) g.push(s.slice(i, i+n));
  return g;
}
function jaccard(a, b) {
  const sa = new Set(a), sb = new Set(b);
  let inter = 0;
  sa.forEach(x => { if (sb.has(x)) inter++; });
  const u = sa.size + sb.size - inter;
  return u > 0 ? inter / u : 0;
}

function expandQuery(query) {
  const tokens = query.toLowerCase()
    .replace(/[?？.,!~]/g," ").split(/\s+/).filter(t => t.length >= 1);
  const expanded = new Set();
  tokens.forEach(tok => {
    expanded.add(tok);
    const mapped = KEYWORD_MAP[tok];
    if (mapped) mapped.forEach(t => expanded.add(t));
  });
  return { tokens, expanded };
}

function tagSearch(expanded) {
  return FAQ
    .map(item => ({ item, hits: item.tags.filter(t => expanded.has(t)).length }))
    .filter(s => s.hits > 0)
    .sort((a, b) => b.hits - a.hits);
}

function similaritySearch(query) {
  const q2 = ngrams(query, 2), q3 = ngrams(query, 3);
  let best = { score: 0, item: null };
  FAQ.forEach(item => {
    const kwHits = item.tags.filter(t => query.toLowerCase().includes(t)).length;
    let aliasScore = 0;
    item.aliases.forEach(alias => {
      const s = jaccard(q2, ngrams(alias, 2)) * 0.6 + jaccard(q3, ngrams(alias, 3)) * 0.4;
      if (s > aliasScore) aliasScore = s;
    });
    const origScore = jaccard(q2, ngrams(item.question, 2));
    const total = kwHits * 0.15 + aliasScore * 0.55 + origScore * 0.30;
    if (total > best.score) best = { score: total, item };
  });
  return best.score > 0.06 ? best.item : null;
}

function getResponse(query) {
  const { tokens, expanded } = expandQuery(query);
  const isKeyword = tokens.length <= 2;

  if (isKeyword && expanded.size > 0) {
    const results = tagSearch(expanded);
    if (results.length >= 2) {
      // 매칭된 모든 항목을 관련도 순으로 보여줘 사용자가 직접 선택
      return { mode:"multi", items: results.map(r => r.item), keyword: query.trim() };
    }
    if (results.length === 1) return { mode:"single", item: results[0].item };
  }
  const item = similaritySearch(query);
  if (item) return { mode:"single", item };
  return { mode:"none" };
}

/* ── 렌더링 ─────────────────────────────────────────── */
function escH(s){ return s.replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;"); }

function formatAnswer(text) {
  // 테이블 HTML은 그대로 통과
  if (text.includes("<table>")) {
    let t = text.replace(/\*\*(.*?)\*\*/g,"<strong>$1</strong>");
    const parts = t.split(/(<table>[\s\S]*?<\/table>)/g);
    return parts.map(part => {
      if (part.startsWith("<table>")) return part;
      return formatPlain(part);
    }).join("");
  }
  return formatPlain(text);
}

function formatPlain(text) {
  let t = escH(text).replace(/\*\*(.*?)\*\*/g,"<strong>$1</strong>");
  return t.split(/\n\n+/).map(para => {
    const lines = para.split("\n");
    const isList = lines.some(l => /^[-•]\s|^\d+\.\s/.test(l));
    if (isList) {
      return "<ul>" + lines.filter(l=>l.trim())
        .map(l=>"<li>"+l.replace(/^[-•]\s|^\d+\.\s/,"")+"</li>").join("") + "</ul>";
    }
    return "<p>" + lines.join("<br>") + "</p>";
  }).join("");
}

const chatMessages    = document.getElementById("chat-messages");
const chatArea        = document.getElementById("chat-area");
const typingIndicator = document.getElementById("typing-indicator");
const userInput       = document.getElementById("user-input");
const sendBtn         = document.getElementById("send-btn");

function appendBotBubble(html, showLinks) {
  const wrap = document.createElement("div"); wrap.className = "message assistant";
  const av   = document.createElement("div"); av.className = "avatar"; av.textContent = "IN";
  const bub  = document.createElement("div"); bub.className = "bubble"; bub.innerHTML = html;
  wrap.appendChild(av); wrap.appendChild(bub);
  chatMessages.insertBefore(wrap, typingIndicator);

  if (showLinks) {
    const footer = document.createElement("div"); footer.className = "message-footer";
    const label  = document.createElement("span"); label.className = "product-links-label";
    label.textContent = "관련 제품 바로가기";
    const links  = document.createElement("div"); links.className = "product-links";
    Object.entries(PRODUCT_LINKS).forEach(([name, url]) => {
      const a = document.createElement("a");
      a.href=url; a.target="_blank"; a.rel="noopener noreferrer";
      a.className="product-link"; a.textContent=name;
      links.appendChild(a);
    });
    footer.appendChild(label); footer.appendChild(links);
    chatMessages.insertBefore(footer, typingIndicator);
  }
  scrollBottom();
  return bub; // 이벤트 바인딩용 반환
}

function renderSingle(item) {
  appendBotBubble(formatAnswer(item.answer), true);
}

/* 명확화 질문 — 여러 결과일 때 카테고리별 그룹 선택지 제시 */
function renderClarify(keyword, items) {
  const bub = appendBotBubble("", false);

  const intro = document.createElement("p");
  intro.className = "clarify-intro";
  intro.innerHTML = `<strong>'${escH(keyword)}'</strong> 관련 주제가 있어요.<br>어떤 내용이 궁금하신가요?`;
  bub.appendChild(intro);

  // 카테고리별 그룹핑 (등장 순서 유지)
  const groups = new Map();
  items.forEach(item => {
    if (!groups.has(item.category)) groups.set(item.category, []);
    groups.get(item.category).push(item);
  });

  const isMultiCat = groups.size > 1;

  function makeBtn(item) {
    const btn = document.createElement("button");
    btn.className = "clarify-btn";
    btn.textContent = item.question;
    btn.addEventListener("click", async () => {
      bub.querySelectorAll(".clarify-btn").forEach(b => b.disabled = true);
      btn.style.background = "var(--primary)";
      btn.style.color = "#fff";
      btn.style.borderColor = "var(--primary)";
      appendUser(item.question);
      isTyping = true; sendBtn.disabled = true;
      typingIndicator.style.display = "flex"; scrollBottom();
      await new Promise(r => setTimeout(r, 350 + Math.random() * 300));
      typingIndicator.style.display = "none";
      isTyping = false; sendBtn.disabled = false;
      renderSingle(item);
    });
    return btn;
  }

  groups.forEach((catItems, cat) => {
    // 카테고리가 2개 이상일 때만 헤더 표시
    if (isMultiCat) {
      const header = document.createElement("div");
      header.className = "clarify-cat-header";
      header.textContent = cat;
      bub.appendChild(header);
    }
    const opts = document.createElement("div");
    opts.className = "clarify-options";
    catItems.forEach(item => opts.appendChild(makeBtn(item)));
    bub.appendChild(opts);
  });

  scrollBottom();
}

function renderNone() {
  appendBotBubble(
    `<p>해당 내용은 FAQ에서 찾을 수 없었습니다.</p>` +
    `<p>다른 표현으로 질문하거나, 아래 키워드를 입력해 보세요.</p>` +
    `<p><strong>재료:</strong> 석재, 포세린, 흡수율, 외부, 논슬립, 동결융해, 내구성, 열팽창<br>` +
    `<strong>습식:</strong> 강도, 접착제, 등급, 줄눈, 구배, 온도, 교반, 범위, 두께, 방수<br>` +
    `<strong>건식:</strong> 각관, 장선, 스페이서, 패드, 클립, 고정, 조인트, 이음, 실리콘</p>`,
    false
  );
}

function appendUser(text) {
  const wrap = document.createElement("div"); wrap.className = "message user";
  const bub  = document.createElement("div"); bub.className = "bubble"; bub.textContent = text;
  wrap.appendChild(bub);
  chatMessages.insertBefore(wrap, typingIndicator);
  scrollBottom();
}

function scrollBottom() { requestAnimationFrame(() => { chatArea.scrollTop = chatArea.scrollHeight; }); }

/* ── 전송 ──────────────────────────────────────────── */
let isTyping = false;

async function handleSend() {
  const msg = userInput.value.trim();
  if (!msg || isTyping) return;
  userInput.value = ""; autoResize();
  appendUser(msg);

  isTyping = true; sendBtn.disabled = true;
  typingIndicator.style.display = "flex"; scrollBottom();
  await new Promise(r => setTimeout(r, 400 + Math.random() * 400));
  typingIndicator.style.display = "none";
  isTyping = false; sendBtn.disabled = false;

  const result = getResponse(msg);
  if      (result.mode === "multi")  renderClarify(result.keyword, result.items);
  else if (result.mode === "single") renderSingle(result.item);
  else                               renderNone();
}

function autoResize() {
  userInput.style.height = "auto";
  userInput.style.height = Math.min(userInput.scrollHeight, 120) + "px";
}

/* ── 빠른 질문 버튼 ─────────────────────────────────── */
function renderQuick() {
  const cats = [...new Set(FAQ.map(f => f.category))];
  const qc   = document.getElementById("quick-categories");
  const qq   = document.getElementById("quick-questions");
  qc.innerHTML = ""; qq.innerHTML = "";
  cats.forEach((cat, i) => {
    const btn = document.createElement("button");
    btn.className = "category-btn" + (i === 0 ? " active" : "");
    btn.textContent = cat;
    btn.addEventListener("click", () => {
      document.querySelectorAll(".category-btn").forEach(b => b.classList.remove("active"));
      btn.classList.add("active"); renderQBtns(cat);
    });
    qc.appendChild(btn);
  });
  renderQBtns(cats[0]);
}

function renderQBtns(cat) {
  const qq = document.getElementById("quick-questions");
  qq.innerHTML = "";
  FAQ.filter(f => f.category === cat).slice(0, 4).forEach(({ question }) => {
    const btn = document.createElement("button");
    btn.className = "quick-q-btn"; btn.textContent = question; btn.title = question;
    btn.addEventListener("click", () => { userInput.value = question; autoResize(); handleSend(); });
    qq.appendChild(btn);
  });
}

/* ── 이벤트 ─────────────────────────────────────────── */
sendBtn.addEventListener("click", handleSend);
userInput.addEventListener("keydown", e => { if (e.key==="Enter"&&!e.shiftKey) { e.preventDefault(); handleSend(); } });
userInput.addEventListener("input", autoResize);

/* ── 시작 ──────────────────────────────────────────── */
renderQuick();
appendBotBubble(
  `<p>안녕하세요! 포세린 타일 시공 Q&A 챗봇입니다 👋</p>` +

  `<strong>질문 형태</strong>로 입력하면 가장 관련 높은 답변을 드립니다.</p>` +
  `<p><strong>재료:</strong> 석재 · 외부 · 흡수율<br>` +
  `<strong>습식:</strong> 강도 · 접착제 · 등급 · 줄눈 · 구배 · 온도 · 교반 · 범위 · 두께<br>` +
  `<strong>건식:</strong> 각관 · 장선 · 스페이서 · 패드 · 클립 · 고정 · 조인트</p>`,
  true
